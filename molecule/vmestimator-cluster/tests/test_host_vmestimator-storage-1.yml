---
service:
  vmestimator-storage:
    running: true

port:
  tcp:8491:
    listening: true

file:
  /etc/vmestimator/streams.yaml:
    exists: true
  /etc/systemd/system/vmestimator-storage.service:
    exists: true
    contains:
      - 'Environment="config=/etc/vmestimator/streams.yaml"'
      - 'Environment="cardinalityMetrics_exposeAt=/cardinality/metrics"'
      - "ExecStart=/usr/local/bin/vmestimator -envflag.enable"
