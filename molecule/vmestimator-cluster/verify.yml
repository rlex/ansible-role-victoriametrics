---
- name: Verify
  hosts: all
  become: true
  vars:
    goss_version: v0.4.4
    goss_arch_table:
      aarch64:
        arch: arm64
      x86_64:
        arch: amd64
    goss_bin: /usr/local/bin/goss
    goss_url: >-
      {{ 'https://github.com/aelsabbahy/goss/releases/download/'
         ~ goss_version
         ~ '/goss-'
         ~ ansible_facts['system'] | lower
         ~ '-'
         ~ victoriametrics_goss_arch }}
    goss_test_directory: /tmp/molecule/goss
    goss_format: tap
  tasks:
    - name: Decide host arch
      ansible.builtin.set_fact:
        victoriametrics_goss_arch: >-
          {{ goss_arch_table[ansible_facts['architecture']].arch }}

    - name: Download and install Goss
      ansible.builtin.get_url:
        url: "{{ goss_url }}"
        dest: "{{ goss_bin }}"
        mode: "u=rwx,go=rx"
      register: victoriametrics_download_goss
      until: victoriametrics_download_goss is succeeded
      retries: 3

    - name: Create Molecule directory for test files
      ansible.builtin.file:
        path: "{{ goss_test_directory }}"
        state: directory
        mode: "0755"

    - name: Find Goss tests on localhost
      ansible.builtin.find:
        paths: "{{ lookup('env', 'MOLECULE_VERIFIER_TEST_DIRECTORY') }}"
        patterns:
          - "test[-.\\w]*.yml"
          - "test_host_{{ ansible_facts['hostname'] }}[-.\\w]*.yml"
        excludes:
          - "test_host_(?!{{ ansible_facts['hostname'] }})[-.\\w]*.yml"
        use_regex: true
      delegate_to: localhost
      register: victoriametrics_test_files
      changed_when: false
      become: false

    - name: Copy Goss tests to remote
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ goss_test_directory }}/{{ item.path | basename }}"
        mode: "0644"
      loop: "{{ victoriametrics_test_files.files | flatten }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Register test files
      ansible.builtin.find:
        paths:
          - "{{ goss_test_directory }}"
        patterns:
          - "test_*.yml"
          - "test-*.yml"
      register: victoriametrics_test_files

    - name: Run verify
      when: victoriametrics_test_files is succeeded
      block:
        - name: Execute Goss tests  # noqa: no-changed-when
          ansible.builtin.command: >-
            {{ goss_bin }} -g {{ item }} validate --format {{ goss_format }}
          register: victoriametrics_test_results
          loop: >-
            {{ victoriametrics_test_files.files
               | map(attribute='path')
               | list }}
          loop_control:
            label: "{{ item | basename }}"
          failed_when: false

        - name: Display details about the Goss results
          ansible.builtin.debug:
            msg: "{{ item.stdout_lines }}"
          loop: "{{ victoriametrics_test_results.results }}"
          loop_control:
            label: "{{ item[item.ansible_loop_var] | basename }}"

        - name: Fail when tests fail
          ansible.builtin.fail:
            msg: "Goss failed to validate"
          when: item.rc != 0
          loop: "{{ victoriametrics_test_results.results }}"
          loop_control:
            label: "{{ item[item.ansible_loop_var] | basename }}"
