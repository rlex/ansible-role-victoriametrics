---
- name: Create victoriametrics storage directory
  ansible.builtin.file:
    path: "{{ victoriametrics_storage_data_path }}"
    state: directory
    owner: "{{ victoriametrics_user }}"
    group: "{{ victoriametrics_user }}"
    mode: "0755"

- name: Download victoriametrics files
  become: false
  ansible.builtin.get_url:
    url: >-
      {{
        'https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v'
        ~ victoriametrics_cluster_version
        ~ '/victoria-metrics-'
        ~ ansible_facts['system'] | lower
        ~ '-'
        ~ victoriametrics_arch
        ~ '-v'
        ~ victoriametrics_cluster_version
        ~ '.tar.gz'
      }}
    dest: /tmp/
    mode: "0755"
  delegate_to: localhost

- name: Create temporary directory
  become: false
  ansible.builtin.file:
    path: >-
      {{ '/tmp/victoriametrics_%s_%s'
         | format(victoriametrics_version, victoriametrics_arch) }}
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: Unarchive victoriametrics files
  become: false
  ansible.builtin.unarchive:
    src: >-
      {{ '/tmp/victoria-metrics-%s-%s-v%s.tar.gz'
         | format(
             ansible_facts['system'] | lower,
             victoriametrics_arch,
             victoriametrics_version
           ) }}
    remote_src: true
    dest: >-
      {{ '/tmp/victoriametrics_%s_%s/'
         | format(victoriametrics_version, victoriametrics_arch) }}
    creates: >-
      {{ '/tmp/victoriametrics_%s_%s/victoria-metrics-prod'
         | format(victoriametrics_version, victoriametrics_arch) }}
  delegate_to: localhost
  check_mode: false

- name: Propagate victoriametrics binary
  ansible.builtin.copy:
    src: >-
      {{ '/tmp/victoriametrics_%s_%s/victoria-metrics-prod'
         | format(victoriametrics_version, victoriametrics_arch) }}
    dest: /usr/local/bin/victoriametrics
    mode: "0755"
    owner: "{{ victoriametrics_user }}"
    group: "{{ victoriametrics_user }}"
  notify:
    - Restart victoriametrics

- name: Create victoriametrics systemd service unit
  ansible.builtin.template:
    src: singlenode/victoriametrics.service.j2
    dest: /etc/systemd/system/victoriametrics.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart victoriametrics
